<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=0">
<meta name="description" content="POS - Bootstrap Admin Template">
<meta name="keywords" content="admin, estimates, bootstrap, business, corporate, creative, invoice, html5, responsive, Projects">
<meta name="author" content="Dreamguys - Bootstrap Admin Template">
<meta name="robots" content="noindex, nofollow">
<title>Login</title>

<link rel="shortcut icon" type="image/x-icon" href="Admin/assets/img/siw.png">
<link rel="stylesheet" href="Admin/assets/css/bootstrap.min.css">
<link rel="stylesheet" href="Admin/assets/plugins/fontawesome/css/fontawesome.min.css">
<link rel="stylesheet" href="Admin/assets/plugins/fontawesome/css/all.min.css">
<link rel="stylesheet" href="Admin/assets/css/style.css">
</head>
<body class="account-page">
<div class="main-wrapper">
<div class="account-content">
<div class="login-wrapper">
<div class="login-content">
<div class="login-userset">
<div class="login-logo">
<img src="Admin/assets/img/siw.png" alt="img" width="100" height="100">
</div>
<div class="login-userheading">
<h3>Aceder</h3>
<h4>Insira os Dados para Aceder</h4>
</div>
<div class="form-login">
<label>Email</label>
<div class="form-addons">
<input type="text" placeholder="Insira o Email">
<img src="Admin/assets/img/icons/mail.svg" alt="img">
</div>
</div>
<div class="form-login">
<label>Senha</label>
<div class="pass-group">
<input type="password" class="pass-input" placeholder="Insira a Senha">
<span class="fas toggle-password fa-eye-slash"></span>
</div>
</div>
<div class="form-login">
<div class="alreadyuser">
<h4><a href="Admin/assets/forgetpassword.html" class="hover-a">Esqueceu a Senha?</a></h4>
</div>
</div>
<div class="form-login">
<a class="btn btn-login" href="Admin/dashboard.html">Aceder</a>
</div>
<div class="signinform text-center">
<h4>Esqueceu a Senha? <a href="Admin/signup.html" class="hover-a">Recuperar</a></h4>
</div>
<div class="form-setlogin">
<h4>Ou Aceder Via</h4>
</div>
<div class="form-sociallink">
<ul>
<li>
<a href="javascript:void(0);">
<img src="Admin/assets/img/icons/google.png" class="me-2" alt="google">
Google Account
</a>
</li>
<li>
<a href="javascript:void(0);">
<img src="Admin/assets/img/icons/facebook.png" class="me-2" alt="google">
Facebook
</a>
</li>
</ul>
</div>
</div>
</div>
<div class="login-img">
<img src="Admin/assets/img/siw.png" alt="img">
</div>
</div>
</div>
</div>


<script src="Admin/assets/js/jquery-3.6.0.min.js"></script>

<script src="Admin/assets/js/feather.min.js"></script>

<script src="Admin/assets/js/bootstrap.bundle.min.js"></script>

<script src="Admin/assets/js/script.js"></script>
</body>
</html>
